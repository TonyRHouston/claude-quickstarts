on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      builder:
        required: true
        type: string
      registry:
        required: true
        type: string
      tag_prefix:
        required: false
        type: string
      context:
        required: false
        type: string
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Login to ghcr.io
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{github.actor}}
        password: ${{secrets.GITHUB_TOKEN}}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Set image tag
      run: 'short_sha=$(git rev-parse --short ${{ github.sha }})

        echo "TAG=${{ inputs.registry }}:${{ inputs.tag_prefix }}${short_sha}" >>
        "$GITHUB_ENV"

        '
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        platforms: linux/${{ inputs.platform }}
        context: ${{ inputs.context || '.' }}
        push: false
        tags: ${{ env.TAG }}
        cache-from: type=gha,scope=computer-use-${{ inputs.platform }}
        cache-to: type=gha,mode=max,scope=computer-use-${{ inputs.platform }}
        load: true
    - name: Run container
      run: docker run -d -p 8051:8051 ${{ env.TAG }}
    - name: Check streamlit
      run: "timeout=60\nstart_time=$(date +%s)\ndocker_id=$(docker ps --filter \"\
        ancestor=${{ env.TAG }}\" --format \"{{.ID}}\")\necho \"docker_id=$docker_id\"\
        \ >> \"$GITHUB_ENV\"\nwhile true; do\n  current_time=$(date +%s)\n  elapsed=$((current_time\
        \ - start_time))\n  if [ $elapsed -ge $timeout ]; then\n    echo \"Timeout\
        \ reached. Container did not respond within $timeout seconds.\"\n    exit\
        \ 1\n  fi\n  response=$(docker exec $docker_id curl -s -o /dev/null -w \"\
        %{http_code}\" http://127.0.0.1:8501 || echo \"000\")\n  if [ \"$response\"\
        \ = \"200\" ]; then\n    echo \"Container responded with 200 OK\"\n    exit\
        \ 0\n  fi\ndone\n"
    - name: Check VNC
      run: docker exec $docker_id nc localhost 5900 -z
    - name: Check noVNC
      run: docker exec $docker_id curl -s -o /dev/null -w "%{http_code}" http://localhost:6080
        | grep -q 200 || exit 1
    - name: Check landing page
      run: docker exec $docker_id curl -s -o /dev/null -w "%{http_code}" http://localhost:8080
        | grep -q 200 || exit 1
    - name: Determine push tags
      run: "if [ \"${{ github.event_name }}\" == \"pull_request\" ]; then\n  echo\
        \ \"PUSH_TAGS=${TAG}-${{ inputs.platform }}\" >> \"$GITHUB_ENV\"\nelse\n \
        \ echo \"PUSH_TAGS=${TAG}-${{ inputs.platform }},${{ inputs.registry }}:${{\
        \ inputs.tag_prefix }}latest-${{ inputs.platform }}\" >> \"$GITHUB_ENV\"\n\
        fi\n"
    - name: Push Docker image
      uses: docker/build-push-action@v5
      with:
        platforms: linux/${{ inputs.platform }}
        context: ${{ inputs.context || '.' }}
        push: true
        tags: ${{ env.PUSH_TAGS }}
        cache-from: type=gha,scope=computer-use-${{ inputs.platform }}
        cache-to: type=gha,mode=max,scope=computer-use-${{ inputs.platform }}
